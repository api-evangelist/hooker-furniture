description: Hooker Furnishings is a publicly traded US furniture wholesaler / manufacturer (NASDAQ
  - HOFT). It does not operate a public developer API portal. The hookerfurniture.com site is a
  dealer / B2B website rather than a developer platform; references in this scaffold to api.hookerfurniture.com
  and developer.hookerfurniture.com are placeholders. There is no published API pricing surface.
notes: No public developer portal or commercial API was identified. This artifact is preserved as
  a trimmed scaffold for future reconciliation if Hooker Furnishings publishes APIs in the future.
sources:
  - https://www.hookerfurnishings.com/
plans:
  - id: hooker-furniture-no-public-api
    name: No Public API
    type: enterprise
    description: No public developer API or pricing surface is published. Any electronic data interchange
      with dealers / partners is contract-bound through the Hooker Furnishings dealer program rather
      than a public API.
    entries:
      - label: Partner integration
        name: partner_integration
        type: subscription
        metric: partner
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: contact Hooker Furnishings
        userMultiplied: false
    elements:
      - name: Dealer program (contract-bound)
      - name: B2B account portal
      - name: No public API documentation
